name: Build Native Apps

on:
  push:
    branches: [main, feat/timestamp-fixes]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: Inject env vars
        run: |
          echo "NEXT_PUBLIC_KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_WORKER_URL=${{ secrets.WORKER_URL }}" >> .env.local
      - run: npm run build -- --webpack

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: android-actions/setup-android@v3

      - run: npx cap add android
      - run: npx cap sync android

      - run: |
          cd android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug

      - name: Get version
        id: ver
        run: echo "v=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.v }}
          draft: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - name: Inject env vars
        run: |
          echo "NEXT_PUBLIC_KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_WORKER_URL=${{ secrets.WORKER_URL }}" >> .env.local
      - run: npm run build -- --webpack
      - run: npx cap add ios
      - run: npx cap sync ios
      - name: Inject Info.plist location keys
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string '출근 페이지에서 현재 위치를 표시하기 위해 위치 접근이 필요합니다.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string '출퇴근 시간에 근처 도착하면 자동으로 Shiftee를 실행하기 위해 위치 접근이 필요합니다.'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Camera access needed for timestamp photo capture'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Photo library access needed to pick photos'" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string 'location'" "$PLIST" 2>/dev/null || true
          echo "--- Info.plist location keys ---"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$PLIST"

      - name: Build .app (unsigned)
        run: |
          WORKSPACE=$(find ios -maxdepth 3 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found"
            exit 1
          fi
          WORKSPACE_DIR=$(dirname "$WORKSPACE")
          WORKSPACE_NAME=$(basename "$WORKSPACE")

          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A1 "Schemes:" | tail -1 | xargs)
          if [ -z "$SCHEME" ]; then
            SCHEME="App"
          fi
          echo "Building: workspace=$WORKSPACE_NAME scheme=$SCHEME"

          xcodebuild build \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package .app → .ipa
        run: |
          APP_PATH=$(find build -name "*.app" -path "*/Build/Products/*" | grep -v "Simulator" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          echo "Found .app: $APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r B-Mark.ipa Payload
          rm -rf Payload

      - name: Get version
        id: ver
        run: echo "v=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Release IPA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.v }}
          draft: true
          files: B-Mark.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
