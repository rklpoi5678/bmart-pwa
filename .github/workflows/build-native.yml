name: Build Native Apps

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.v }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build -- --webpack

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - uses: android-actions/setup-android@v3

      - run: npx cap add android
      - run: npx cap sync android

      - run: |
          cd android
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug

      - name: Get version
        id: ver
        run: echo "v=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.ver.outputs.v }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build -- --webpack
      - run: npx cap add ios
      - run: npx cap sync ios

      - name: Debug ios structure
        run: find ios -maxdepth 4 \( -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "*.plist" \) 2>/dev/null || echo "ios directory not found"

      - name: Build IPA
        run: |
          WORKSPACE=$(find ios -maxdepth 3 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No .xcworkspace found"
            exit 1
          fi
          WORKSPACE_DIR=$(dirname "$WORKSPACE")
          WORKSPACE_NAME=$(basename "$WORKSPACE")

          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list 2>/dev/null | grep -A1 "Schemes:" | tail -1 | xargs)
          if [ -z "$SCHEME" ]; then
            SCHEME="App"
          fi
          echo "Building: workspace=$WORKSPACE_NAME scheme=$SCHEME"

          cd "$WORKSPACE_DIR"
          xcodebuild -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p build/ipa
          cp -r build/App.xcarchive/Products/Applications/*.app build/ipa/
          cd build/ipa
          mkdir Payload
          mv *.app Payload/
          zip -r B-Mark.ipa Payload

      - name: Get version
        id: ver
        run: echo "v=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ios/App/build/ipa/B-Mark.ipa

  release:
    needs: [build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-android.outputs.version }}
          draft: true
          files: |
            artifacts/apk/*.apk
            artifacts/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
