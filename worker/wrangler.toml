name = "bmark-proxy"
main = "index.ts"
compatibility_date = "2024-12-01"

# Run `wrangler kv namespace create PUSH_SUBSCRIPTIONS` then paste the ID below
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "YOUR_KV_NAMESPACE_ID"

# Cron triggers for shift reminders
# 8:55 AM — 출근 알림
# 5:55 PM — 퇴근 알림
[triggers]
crons = ["55 8 * * *", "55 17 * * *"]

[vars]
# Set these via `wrangler secret put`:
# SLACK_WEBHOOK_URL
# GOOGLE_SHEETS_ID
# GOOGLE_SERVICE_ACCOUNT_EMAIL
# GOOGLE_PRIVATE_KEY
# VAPID_PRIVATE_KEY
# VAPID_PUBLIC_KEY
# VAPID_SUBJECT (e.g. mailto:admin@example.com)
