name = "bmark-proxy"
main = "index.ts"
compatibility_date = "2024-12-01"

# D1 Database for account management
[[d1_databases]]
binding = "DB"
database_name = "bmark-accounts"
database_id = "3e247208-4bf2-43a8-8876-525a84d27096"

[vars]
# Set these via `wrangler secret put`:
# SLACK_WEBHOOK_URL
# GOOGLE_SHEETS_ID
# GOOGLE_SERVICE_ACCOUNT_EMAIL
# GOOGLE_PRIVATE_KEY
# VAPID_PRIVATE_KEY
# VAPID_PUBLIC_KEY
# VAPID_SUBJECT (e.g. mailto:admin@example.com)
